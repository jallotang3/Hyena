name: hyena
description: "Hyena — 多面板可插拔 VPN 客户端，V1 默认接入 xboard + sing-box"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- 网络 ---
  dio: ^5.7.0

  # --- 状态管理 ---
  provider: ^6.1.2

  # --- 导航 ---
  go_router: ^14.6.2

  # --- 本地存储 ---
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0

  # --- FFI (libbox/sing-box) ---
  ffi: ^2.1.3

  # --- 工具 ---
  intl: ^0.20.2
  path_provider: ^2.1.5
  path: ^1.9.0
  uuid: ^4.5.1
  package_info_plus: ^8.1.3
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0

  # --- UI ---
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1

  # --- 桌面 ---
  window_manager: ^0.4.3
  tray_manager: ^0.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/configs/

  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
  #   - family: JetBrainsMono
  #     fonts:
  #       - asset: assets/fonts/JetBrainsMono-Regular.ttf
